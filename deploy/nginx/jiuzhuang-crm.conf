map $http_upgrade $crm_connection_upgrade {
    default upgrade;
    '' close;
}

limit_conn_zone $binary_remote_addr zone=asterisk_ws_per_ip:10m;

server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    client_max_body_size 10m;

    access_log /var/log/nginx/jiuzhuang-crm.access.log;
    error_log /var/log/nginx/jiuzhuang-crm.error.log warn;

    # WebSocket endpoint 过渡期: 老 /asterisk/ws 和新 /asterisk/ws-v2 同时
    # 接受请求, 共用一套 proxy 规则. 数据库 sip config 改完后, 把老 location
    # 改成 `return 410;` 强制下线老路径.
    location ^~ /asterisk/ws {
        limit_conn asterisk_ws_per_ip 8;
        limit_conn_status 429;

        proxy_pass http://192.168.11.103:8088/ws;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $crm_connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    location ^~ /asterisk/ws-v2 {
        limit_conn asterisk_ws_per_ip 8;
        limit_conn_status 429;

        proxy_pass http://192.168.11.103:8088/ws;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $crm_connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 3600s;
        proxy_request_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $crm_connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
